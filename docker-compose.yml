version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: holmes_backend
    expose:
      - "8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////data/holmes.db
      - HOLMES_SECRET_KEY=holmes-default-secret-key-32bytes-long!
    volumes:
      - holmes_db:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: holmes_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=
    restart: unless-stopped

volumes:
  holmes_db:
    driver: local
