services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: holmes_backend
    ports:
      - "8000:8000"
    volumes:
      - holmes_data:/app/data
    networks:
      - holmes_network
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_PATH=/app/data/holmes.db
    restart: unless-stopped

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: holmes_frontend
    ports:
      - "80:80"
    networks:
      - holmes_network
    restart: unless-stopped

networks:
  holmes_network:
    driver: bridge

volumes:
  holmes_data:
